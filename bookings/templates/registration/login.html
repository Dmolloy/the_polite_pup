{% extends 'bookings/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="info-card">
            <h2 class="mb-4 text-center">Login</h2>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-grid mt-3">
                    <button class="btn btn-primary btn-lg">
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
